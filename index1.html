<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>关卡结构化掉落编辑器</title>
    <style>
        :root { --bg: #0d0d0d; --card: #1a1a1a; --cyan: #00e5ff; --gold: #ff9f43; --border: #333; --text: #d1d1d1; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 15px; font-size: 12px; }
        
        .main-layout { display: grid; grid-template-columns: 320px 1fr; gap: 15px; height: 100vh; }
        .side-panel { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; padding-right: 5px; }
        .content-panel { background: var(--card); border-radius: 8px; border: 1px solid var(--border); display: flex; flex-direction: column; }
        
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 12px; }
        h3 { color: var(--cyan); margin: 0 0 10px 0; font-size: 14px; border-left: 3px solid var(--cyan); padding-left: 8px; }
        
        /* 表格样式：模仿参考图 */
        .table-container { flex: 1; overflow: auto; padding: 10px; }
        table { width: 100%; border-collapse: collapse; background: #000; table-layout: fixed; }
        th, td { border: 1px solid var(--border); padding: 4px 8px; text-align: center; }
        th { background: #222; color: #888; font-weight: normal; font-size: 11px; }
        
        /* 录入区样式 */
        textarea { width: 100%; height: 120px; background: #000; color: #00ff41; border: 1px solid var(--border); font-family: monospace; font-size: 11px; padding: 5px; box-sizing: border-box; }
        input, select { background: #000; border: 1px solid var(--border); color: #fff; padding: 4px; border-radius: 3px; width: 100%; box-sizing: border-box; }
        
        .btn { cursor: pointer; border: none; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        .btn-add { background: #222; color: var(--cyan); border: 1px solid var(--cyan); padding: 5px 10px; margin-bottom: 10px; }
        .btn-gen { background: var(--cyan); color: #000; padding: 12px; font-size: 14px; width: 100%; margin-top: 10px; }
        .btn-del { background: #442222; color: #ff8888; font-size: 10px; padding: 2px 5px; }

        /* 颜色标签 */
        .q-tag { padding: 1px 4px; border-radius: 2px; font-weight: bold; font-size: 10px; }
        .Legendary { background: #ff8000; color: #fff; }
        .Epic { background: #a335ee; color: #fff; }
        .Rare { background: #0070dd; color: #fff; }
        .Common { background: #666; color: #fff; }

        /* 说明区 */
        .manual-box { font-size: 11px; color: #888; line-height: 1.5; border-top: 1px solid #333; padding-top: 10px; }
        .manual-box b { color: var(--gold); }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="side-panel">
        <div class="card">
            <h3>1. 资源池 & 预算</h3>
            <label style="font-size:10px;">掉落库 (ID,品质):</label>
            <textarea id="poolInput">Item_LingShi,Common
Item_MiJi,Rare
Item_DanYao,Rare
Item_SuiPian,Legendary
Item_YueChi,Epic</textarea>
            
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:10px;">
                <div><label>金:</label><input type="number" id="b_Legendary" value="2"></div>
                <div><label>紫:</label><input type="number" id="b_Epic" value="3"></div>
                <div><label>蓝:</label><input type="number" id="b_Rare" value="10"></div>
                <div><label>绿:</label><input type="number" id="b_Common" value="20"></div>
            </div>
        </div>

        <button class="btn btn-gen" onclick="generate()">生成伪随机配置</button>

        <div class="card">
            <h3>2. 导出 JSON</h3>
            <textarea id="jsonOutput" style="height:100px;" readonly></textarea>
        </div>

        <div class="card manual-box">
            <h4>📖 使用说明</h4>
            1. <b>房间管理：</b> 点击“添加房间”建立大层级。<br>
            2. <b>交互物：</b> 在房间内添加交互物 ID (如 201, 202)。<br>
            3. <b>多项掉落：</b> 为同一个交互物添加多个“槽位”，即可实现图 2 中一个 ID 对应多行物品的效果。<br>
            4. <b>数量控制：</b> 修改 <b>Qty</b> 决定单堆掉落数。
        </div>
    </div>

    <div class="content-panel">
        <div style="padding:10px; border-bottom:1px solid #333; display:flex; justify-content:space-between;">
            <span style="color:var(--cyan); font-weight:bold;">关卡结构化配置表 (预览/编辑)</span>
            <button class="btn btn-add" onclick="addRoom()">+ 添加新房间</button>
        </div>
        
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th width="80">房间 ID</th>
                        <th width="100">交互物 ID</th>
                        <th width="120">物品 ID (锁定/随机)</th>
                        <th width="100">指定品质</th>
                        <th width="60">数量 (Qty)</th>
                        <th width="50">操作</th>
                    </tr>
                </thead>
                <tbody id="mainBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let configData = [
        { roomId: "1", targets: [{ id: "200", slots: [{ lockId: "", lockQ: "Common", qty: 10 }, { lockId: "", lockQ: "Rare", qty: 1 }] }] }
    ];

    function render() {
        const tbody = document.getElementById('mainBody');
        tbody.innerHTML = '';

        configData.forEach((room, rIdx) => {
            room.targets.forEach((target, tIdx) => {
                target.slots.forEach((slot, sIdx) => {
                    const tr = document.createElement('tr');
                    
                    // 房间单元格 (仅在第一行显示)
                    if (tIdx === 0 && sIdx === 0) {
                        const roomTd = `<td rowspan="${getRoomSpan(room)}">
                            <input class="row-input" value="${room.roomId}" onchange="updateData(${rIdx},null,null,'roomId',this.value)">
                            <button class="btn btn-del" onclick="removeRoom(${rIdx})" style="margin-top:5px;">删房间</button>
                        </td>`;
                        tr.innerHTML += roomTd;
                    }

                    // 交互物单元格 (仅在交互物的第一行显示)
                    if (sIdx === 0) {
                        const targetTd = `<td rowspan="${target.slots.length}">
                            <input class="row-input" value="${target.id}" onchange="updateData(${rIdx},${tIdx},null,'targetId',this.value)">
                            <button class="btn btn-add" onclick="addSlot(${rIdx},${tIdx})" style="font-size:9px; padding:2px; margin-top:3px;">+加掉落</button>
                        </td>`;
                        tr.innerHTML += targetTd;
                    }

                    // 物品配置单元格
                    tr.innerHTML += `
                        <td><input class="row-input" placeholder="随机" value="${slot.lockId}" onchange="updateData(${rIdx},${tIdx},${sIdx},'lockId',this.value)"></td>
                        <td>
                            <select class="row-input" onchange="updateData(${rIdx},${tIdx},${sIdx},'lockQ',this.value)">
                                <option value="" ${slot.lockQ==''?'selected':''}>全随机</option>
                                <option value="Legendary" ${slot.lockQ=='Legendary'?'selected':''}>金 (Legendary)</option>
                                <option value="Epic" ${slot.lockQ=='Epic'?'selected':''}>紫 (Epic)</option>
                                <option value="Rare" ${slot.lockQ=='Rare'?'selected':''}>蓝 (Rare)</option>
                                <option value="Common" ${slot.lockQ=='Common'?'selected':''}>绿 (Common)</option>
                            </select>
                        </td>
                        <td><input type="number" class="row-input" value="${slot.qty}" onchange="updateData(${rIdx},${tIdx},${sIdx},'qty',this.value)"></td>
                        <td><button class="btn btn-del" onclick="removeSlot(${rIdx},${tIdx},${sIdx})">x</button></td>
                    `;
                    tbody.appendChild(tr);
                });
                
                // 交互物分隔线逻辑：为房间添加“增加交互物”按钮行
                if (tIdx === room.targets.length - 1) {
                    const addTargetTr = document.createElement('tr');
                    addTargetTr.innerHTML = `<td colspan="5" style="background:#1a1a1a; text-align:left;">
                        <button class="btn btn-add" onclick="addTarget(${rIdx})" style="margin:2px;">+ 为房间 ${room.roomId} 添加交互物</button>
                    </td>`;
                    tbody.appendChild(addTargetTr);
                }
            });
        });
    }

    function getRoomSpan(room) {
        return room.targets.reduce((sum, t) => sum + t.slots.length, 0);
    }

    // 数据操作方法
    function addRoom() { configData.push({ roomId: (configData.length+1).toString(), targets: [{ id: "NEW", slots: [{ lockId: "", lockQ: "", qty: 1 }] }] }); render(); }
    function removeRoom(idx) { configData.splice(idx, 1); render(); }
    function addTarget(rIdx) { configData[rIdx].targets.push({ id: "NEW", slots: [{ lockId: "", lockQ: "", qty: 1 }] }); render(); }
    function addSlot(rIdx, tIdx) { configData[rIdx].targets[tIdx].slots.push({ lockId: "", lockQ: "", qty: 1 }); render(); }
    function removeSlot(rIdx, tIdx, sIdx) { 
        configData[rIdx].targets[tIdx].slots.splice(sIdx, 1);
        if(configData[rIdx].targets[tIdx].slots.length === 0) configData[rIdx].targets.splice(tIdx, 1);
        render(); 
    }
    function updateData(rIdx, tIdx, sIdx, key, val) {
        if (key === 'roomId') configData[rIdx].roomId = val;
        else if (key === 'targetId') configData[rIdx].targets[tIdx].id = val;
        else {
            if (key === 'qty') configData[rIdx].targets[tIdx].slots[sIdx][key] = parseInt(val);
            else configData[rIdx].targets[tIdx].slots[sIdx][key] = val;
        }
    }

    // 生成逻辑
    function generate() {
        const poolRaw = document.getElementById('poolInput').value.trim().split('\n');
        const pool = { Legendary: [], Epic: [], Rare: [], Common: [] };
        poolRaw.forEach(l => { const [id, q] = l.split(','); if(pool[q]) pool[q].push(id); });

        let budget = {
            Legendary: parseInt(document.getElementById('b_Legendary').value),
            Epic: parseInt(document.getElementById('b_Epic').value),
            Rare: parseInt(document.getElementById('b_Rare').value),
            Common: parseInt(document.getElementById('b_Common').value)
        };

        const finalOutput = [];
        configData.forEach(room => {
            room.targets.forEach(target => {
                target.slots.forEach(slot => {
                    let finalId = slot.lockId;
                    let finalQ = slot.lockQ;

                    if (!finalId && finalQ) { // 锁定品质随机
                        if(pool[finalQ].length > 0) {
                            finalId = pool[finalQ][Math.floor(Math.random()*pool[finalQ].length)];
                            budget[finalQ]--;
                        }
                    } else if (!finalId && !finalQ) { // 全随机
                        const keys = Object.keys(budget).filter(k => budget[k] > 0);
                        if(keys.length > 0) {
                            finalQ = keys[Math.floor(Math.random()*keys.length)];
                            finalId = pool[finalQ][Math.floor(Math.random()*pool[finalQ].length)];
                            budget[finalQ]--;
                        }
                    }
                    
                    finalOutput.push({
                        Room: room.roomId,
                        TargetID: target.id,
                        ItemID: finalId || "NONE",
                        Quality: finalQ || "Common",
                        Quantity: slot.qty
                    });
                });
            });
        });
        document.getElementById('jsonOutput').value = JSON.stringify(finalOutput, null, 2);
        alert("生成成功！");
    }

    render();
</script>
</body>
</html>
